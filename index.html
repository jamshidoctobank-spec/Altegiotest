<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Booking</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>


<body style="font-family:sans-serif;padding:20px">

<h2 id="agentName">Загрузка...</h2>

<div id="services"></div>

<div id="bookingForm" style="display:none;margin-top:20px">

<input id="customerName" placeholder="Ваше имя"
style="width:100%;padding:10px;margin-bottom:10px"/>

<input id="bookingTime" type="datetime-local"
style="width:100%;padding:10px;margin-bottom:10px"/>

<button onclick="bookService()" style="padding:12px;width:100%">
Записаться
</button>

<p id="status"></p>

</div>



<script>

const tg = window.Telegram.WebApp
tg.expand()

// agent code из Telegram
const agentCode = tg.initDataUnsafe.start_param

// Supabase
const sb = window.supabase.createClient(
"https://uuiprnacqstiwfuxvyet.supabase.co",
"sb_publishable_B5Zyxa2UnTqlFaOvf1G_kg_2DS9kiqs"
)

let agentId = null
let selectedService = null


async function loadData(){

if(!agentCode){

document.getElementById("agentName").innerText =
"Агент не указан"

return

}


// получаем агента
const { data:agent, error } = await sb
.from("agents")
.select("*")
.eq("agent_code", agentCode)
.single()


if(!agent){

document.getElementById("agentName").innerText =
"Агент не найден"

return

}


agentId = agent.id

document.getElementById("agentName").innerText =
"Запись к " + (agent.full_name || agent.username)


// загружаем услуги
const { data:services } = await sb
.from("services")
.select("*")
.eq("agent_id", agent.id)


const container = document.getElementById("services")


services.forEach(service => {

const btn = document.createElement("button")

btn.style =
"display:block;width:100%;padding:12px;margin:10px 0"

btn.innerText =
service.title + " • " + service.duration_min + " мин"

btn.onclick = () => {

selectedService = service

document.getElementById("bookingForm").style.display = "block"

}

container.appendChild(btn)

})

}


async function bookService(){

const name =
document.getElementById("customerName").value

const time =
document.getElementById("bookingTime").value


if(!name || !time){

alert("Заполните данные")

return

}


const { error } = await sb
.from("bookings")
.insert({

agent_id: agentId,
service_id: selectedService.id,
customer_name: name,
start_time: time

})


if(error){

document.getElementById("status").innerText =
"Ошибка записи ❌"

return

}


document.getElementById("status").innerText =
"Вы записаны ✅"

}


loadData()

</script>

</body>
</html>
