<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AltegioTest</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; padding: 16px; max-width: 520px; margin: 0 auto; }
    h2 { margin: 10px 0 6px; }
    .muted { opacity: .7; font-size: 14px; }
    .card { border: 1px solid #eee; border-radius: 12px; padding: 12px; margin: 12px 0; }
    input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin: 8px 0; }
    button { width: 100%; padding: 12px; border-radius: 12px; border: 0; cursor: pointer; }
    .btn { background: #111; color: #fff; }
    .btn2 { background: #f2f2f2; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .list-item { padding: 10px; border: 1px solid #eee; border-radius: 12px; margin: 8px 0; }
    .right { float: right; }
    .ok { color: #0a7; }
    .bad { color: #c33; }
    .tabs { display:flex; gap:8px; margin: 10px 0; }
    .tab { padding:10px 12px; border-radius: 999px; border:1px solid #eee; cursor:pointer; }
    .tab.active { background:#111; color:#fff; border-color:#111; }
    .hidden { display: none; }
  </style>
</head>

<body>
  <h2 id="title">Загрузка...</h2>
  <div class="muted" id="subtitle"></div>

  <!-- CLIENT MODE -->
  <div id="clientMode" class="hidden">
    <div class="card">
      <h3>Выберите услугу</h3>
      <div id="services"></div>
    </div>

    <div class="card hidden" id="bookingForm">
      <h3>Запись</h3>
      <input id="customerName" placeholder="Ваше имя" />
      <input id="bookingTime" type="datetime-local" />
      <button class="btn" onclick="bookService()">Записаться</button>
      <p id="statusClient" class="muted"></p>
    </div>
  </div>

  <!-- ADMIN MODE -->
  <div id="adminMode" class="hidden">
    <div class="tabs">
      <div class="tab active" id="tabServices" onclick="showTab('services')">Услуги</div>
      <div class="tab" id="tabBookings" onclick="showTab('bookings')">Записи</div>
      <div class="tab" id="tabLink" onclick="showTab('link')">Ссылка</div>
    </div>

    <div id="panelServices">
      <div class="card">
        <h3>Добавить услугу</h3>
        <input id="svcTitle" placeholder="Название (например: Консультация)" />
        <div class="row">
          <input id="svcDuration" type="number" placeholder="Мин" />
          <input id="svcPrice" type="number" placeholder="Цена (необязательно)" />
        </div>
        <button class="btn" onclick="addService()">Добавить</button>
        <p id="statusAdmin1" class="muted"></p>
      </div>

      <div class="card">
        <h3>Мои услуги</h3>
        <div id="servicesAdmin"></div>
      </div>
    </div>

    <div id="panelBookings" class="hidden">
      <div class="card">
        <h3>Мои записи</h3>
        <div id="bookingsAdmin"></div>
      </div>
    </div>

    <div id="panelLink" class="hidden">
      <div class="card">
        <h3>Моя ссылка для клиентов</h3>
        <p class="muted">Скопируй и отправляй клиентам:</p>
        <div class="list-item" id="myLink"></div>
        <button class="btn2" onclick="copyLink()">Скопировать</button>
        <p id="statusAdmin2" class="muted"></p>
      </div>
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const supabase = window.supabase.createClient(
    "https://uuiprnacqstiwfuxvyet.supabase.co",
    "sb_publishable_B5Zyxa2UnTqlFaOvf1G_kg_2DS9kiqs"
  );

  // mode detection
  const startParam = tg?.initDataUnsafe?.start_param || null;
  const tgUserId = tg?.initDataUnsafe?.user?.id || null;

  let agent = null;
  let agentId = null;
  let selectedService = null;

  function setStatus(id, text, ok=true){
    const el = document.getElementById(id);
    if(!el) return;
    el.className = ok ? "muted ok" : "muted bad";
    el.innerText = text;
  }

  function showTab(name){
    document.getElementById("panelServices").classList.toggle("hidden", name !== "services");
    document.getElementById("panelBookings").classList.toggle("hidden", name !== "bookings");
    document.getElementById("panelLink").classList.toggle("hidden", name !== "link");

    document.getElementById("tabServices").classList.toggle("active", name === "services");
    document.getElementById("tabBookings").classList.toggle("active", name === "bookings");
    document.getElementById("tabLink").classList.toggle("active", name === "link");
  }

  async function loadAgentForClient(agentCode){
    const { data, error } = await supabase
      .from("agents")
      .select("*")
      .eq("agent_code", agentCode)
      .single();

    if(error || !data){
      document.getElementById("title").innerText = "Агент не указан";
      document.getElementById("subtitle").innerText = "Откройте ссылку от агента или зайдите через кнопку бота (для админа).";
      return null;
    }
    return data;
  }

  async function loadAgentForAdmin(){
    if(!tgUserId){
      document.getElementById("title").innerText = "Нет Telegram user id";
      document.getElementById("subtitle").innerText = "Открой Mini App из Telegram, не в браузере.";
      return null;
    }

    // агент по tg_user_id
    const { data, error } = await supabase
      .from("agents")
      .select("*")
      .eq("tg_user_id", tgUserId)
      .single();

    if(error || !data){
      document.getElementById("title").innerText = "Ты ещё не зарегистрирован как агент";
      document.getElementById("subtitle").innerText = "Сначала пройди регистрацию через бота, чтобы появился agent_code.";
      return null;
    }
    return data;
  }

  async function loadServicesForAgent(agentId){
    const { data } = await supabase
      .from("services")
      .select("*")
      .eq("agent_id", agentId)
      .order("created_at", { ascending: false });

    return data || [];
  }

  async function loadBookingsForAgent(agentId){
    const { data } = await supabase
      .from("bookings")
      .select("id, customer_name, start_time, service_id, created_at")
      .eq("agent_id", agentId)
      .order("start_time", { ascending: true });

    return data || [];
  }

  // CLIENT UI
  async function renderClient(){
    document.getElementById("clientMode").classList.remove("hidden");
    document.getElementById("adminMode").classList.add("hidden");

    agent = await loadAgentForClient(startParam);
    if(!agent) return;

    agentId = agent.id;
    document.getElementById("title").innerText = "Запись к " + (agent.full_name || agent.username || "агенту");
    document.getElementById("subtitle").innerText = "Выберите услугу и время";

    const services = await loadServicesForAgent(agentId);
    const container = document.getElementById("services");
    container.innerHTML = "";

    if(services.length === 0){
      container.innerHTML = `<div class="muted">У агента пока нет услуг.</div>`;
      return;
    }

    services.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "btn2";
      btn.style.marginTop = "10px";
      btn.innerText = `${s.title} • ${s.duration_min || 0} мин`;
      btn.onclick = () => {
        selectedService = s;
        document.getElementById("bookingForm").classList.remove("hidden");
        setStatus("statusClient", `Выбрано: ${s.title}`, true);
      };
      container.appendChild(btn);
    });
  }

  async function bookService(){
    const name = document.getElementById("customerName").value.trim();
    const time = document.getElementById("bookingTime").value;

    if(!selectedService){
      alert("Сначала выберите услугу");
      return;
    }
    if(!name || !time){
      alert("Заполните имя и время");
      return;
    }

    const { error } = await supabase
      .from("bookings")
      .insert({
        agent_id: agentId,
        service_id: selectedService.id,
        customer_name: name,
        start_time: time
      });

    if(error){
      setStatus("statusClient", "Ошибка записи: " + error.message, false);
      return;
    }

    setStatus("statusClient", "Вы записаны ✅", true);
  }

  // ADMIN UI
  async function renderAdmin(){
    document.getElementById("adminMode").classList.remove("hidden");
    document.getElementById("clientMode").classList.add("hidden");

    agent = await loadAgentForAdmin();
    if(!agent) return;

    agentId = agent.id;

    document.getElementById("title").innerText = "Админ-панель агента";
    document.getElementById("subtitle").innerText = (agent.full_name || agent.username || "") + " • Управление услугами и записями";

    // link
    const botUsername = "testaltegiobot"; // поменяешь на своего реального
    const link = `https://t.me/${botUsername}?startapp=${agent.agent_code}`;
    document.getElementById("myLink").innerText = link;

    await refreshAdminLists();
  }

  async function refreshAdminLists(){
    // services list
    const services = await loadServicesForAgent(agentId);
    const wrap = document.getElementById("servicesAdmin");
    wrap.innerHTML = "";

    if(services.length === 0){
      wrap.innerHTML = `<div class="muted">Пока нет услуг. Добавь первую выше.</div>`;
    } else {
      services.forEach(s => {
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
          <b>${s.title}</b><span class="muted right">${(s.duration_min || 0)} мин</span>
          <div class="muted">id: ${s.id}</div>
          <button class="btn2" style="margin-top:10px" onclick="deleteService('${s.id}')">Удалить</button>
        `;
        wrap.appendChild(div);
      });
    }

    // bookings list
    const bookings = await loadBookingsForAgent(agentId);
    const bwrap = document.getElementById("bookingsAdmin");
    bwrap.innerHTML = "";

    if(bookings.length === 0){
      bwrap.innerHTML = `<div class="muted">Записей пока нет.</div>`;
    } else {
      bookings.forEach(b => {
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
          <b>${b.customer_name}</b>
          <div class="muted">Время: ${new Date(b.start_time).toLocaleString()}</div>
          <div class="muted">service_id: ${b.service_id}</div>
        `;
        bwrap.appendChild(div);
      });
    }
  }

  async function addService(){
    const title = document.getElementById("svcTitle").value.trim();
    const duration = Number(document.getElementById("svcDuration").value || 0);
    const price = document.getElementById("svcPrice").value ? Number(document.getElementById("svcPrice").value) : null;

    if(!title || duration <= 0){
      setStatus("statusAdmin1", "Заполни название и длительность (мин)", false);
      return;
    }

    const payload = {
      agent_id: agentId,
      title,
      duration_min: duration
    };
    if(price !== null) payload.price = price;

    const { error } = await supabase.from("services").insert(payload);

    if(error){
      setStatus("statusAdmin1", "Ошибка: " + error.message, false);
      return;
    }

    document.getElementById("svcTitle").value = "";
    document.getElementById("svcDuration").value = "";
    document.getElementById("svcPrice").value = "";

    setStatus("statusAdmin1", "Услуга добавлена ✅", true);
    await refreshAdminLists();
  }

  async function deleteService(serviceId){
    if(!confirm("Удалить услугу?")) return;

    const { error } = await supabase
      .from("services")
      .delete()
      .eq("id", serviceId)
      .eq("agent_id", agentId);

    if(error){
      alert("Ошибка удаления: " + error.message);
      return;
    }

    await refreshAdminLists();
  }

  async function copyLink(){
    const text = document.getElementById("myLink").innerText;
    try{
      await navigator.clipboard.writeText(text);
      setStatus("statusAdmin2", "Скопировано ✅", true);
    } catch(e){
      setStatus("statusAdmin2", "Не получилось скопировать. Скопируй вручную.", false);
    }
  }

  // START
  (async () => {
    if(startParam){
      await renderClient();
    } else {
      await renderAdmin();
    }
  })();
</script>
</body>
</html>
