<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Booking</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; padding: 16px; margin: 0; }
    h2 { margin: 0 0 12px 0; }
    .muted { color:#666; font-size: 14px; margin-top: 6px; }
    .card { border:1px solid #eee; border-radius:12px; padding:12px; margin:12px 0; }
    button { cursor:pointer; border:0; border-radius:12px; padding:12px; width:100%; font-size:16px; }
    .btn { background:#111; color:#fff; }
    .btn2 { background:#f2f2f2; color:#111; }
    input { width:100%; padding:12px; border:1px solid #ddd; border-radius:12px; font-size:16px; box-sizing: border-box; }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    .error { color:#b00020; }
    .ok { color:#0a7a2f; }
  </style>
</head>

<body>

  <h2 id="agentName">Загрузка...</h2>
  <div id="hint" class="muted"></div>

  <div id="services" class="card" style="display:none">
    <div class="muted" style="margin-bottom:10px">Выберите услугу:</div>
    <div id="servicesList"></div>
    <div id="noServices" class="muted" style="display:none">У агента пока нет услуг.</div>
  </div>

  <div id="bookingForm" class="card" style="display:none">
    <div id="selectedServiceTitle" style="font-weight:600; margin-bottom:10px"></div>

    <input id="customerName" placeholder="Ваше имя" />

    <div style="height:10px"></div>

    <input id="bookingTime" type="datetime-local" />

    <div style="height:12px"></div>

    <button class="btn" onclick="bookService()">Записаться</button>

    <div id="status" class="muted" style="margin-top:10px"></div>

    <div style="height:10px"></div>

    <button class="btn2" onclick="resetSelection()">Выбрать другую услугу</button>
  </div>

<script>
  // Telegram
  const tg = window.Telegram.WebApp;
  tg.expand();

  // IMPORTANT: agentCode приходит только если открыли ссылкой
  // https://t.me/<bot>?startapp=<agentCode>
  const agentCode = tg?.initDataUnsafe?.start_param || null;

  // customer tg id — чтобы потом n8n мог написать клиенту
  const customerTgId = tg?.initDataUnsafe?.user?.id || null;

  // Supabase
  const supabaseUrl = "https://uuiprnacqstiwfuxvyet.supabase.co";
  const supabaseKey = "sb_publishable_B5Zyxa2UnTqlFaOvf1G_kg_2DS9kiqs";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let agentId = null;
  let selectedService = null;

  function setStatus(text, type="muted") {
    const el = document.getElementById("status");
    el.className = type === "ok" ? "ok" : type === "error" ? "error" : "muted";
    el.innerText = text || "";
  }

  function show(elId, yes=true) {
    document.getElementById(elId).style.display = yes ? "block" : "none";
  }

  function resetSelection() {
    selectedService = null;
    show("bookingForm", false);
    setStatus("");
  }

  async function loadData() {
    try {
      // 1) Проверяем agentCode
      if (!agentCode) {
        document.getElementById("agentName").innerText = "Агент не указан";
        document.getElementById("hint").innerText =
          "Откройте через уникальную ссылку агента (startapp).";
        show("services", false);
        show("bookingForm", false);
        return;
      }

      // 2) Загружаем агента
      const { data: agent, error: agentErr } = await supabase
        .from("agents")
        .select("*")
        .eq("agent_code", agentCode)
        .single();

      if (agentErr || !agent) {
        document.getElementById("agentName").innerText = "Агент не найден";
        document.getElementById("hint").innerText =
          "Проверьте правильность ссылки агента.";
        show("services", false);
        show("bookingForm", false);
        return;
      }

      agentId = agent.id;
      document.getElementById("agentName").innerText =
        "Запись к " + (agent.full_name || agent.username || "агенту");
      document.getElementById("hint").innerText =
        "Выберите услугу и время — мы подтвердим запись.";

      // 3) Загружаем услуги агента
      const { data: services, error: servicesErr } = await supabase
        .from("services")
        .select("*")
        .eq("agent_id", agentId)
        .order("title", { ascending: true });

      show("services", true);

      const list = document.getElementById("servicesList");
      list.innerHTML = "";

      if (servicesErr) {
        document.getElementById("noServices").style.display = "block";
        document.getElementById("noServices").innerText = "Ошибка загрузки услуг.";
        return;
      }

      if (!services || services.length === 0) {
        document.getElementById("noServices").style.display = "block";
        return;
      }

      document.getElementById("noServices").style.display = "none";

      services.forEach(s => {
        const btn = document.createElement("button");
        btn.className = "btn2";
        btn.style.margin = "8px 0";
        btn.innerText = `${s.title} • ${s.duration_min} мин`;
        btn.onclick = () => {
          selectedService = s;
          document.getElementById("selectedServiceTitle").innerText =
            "Вы выбрали: " + s.title;
          show("bookingForm", true);
          setStatus("");
        };
        list.appendChild(btn);
      });

    } catch (e) {
      document.getElementById("agentName").innerText = "Ошибка";
      document.getElementById("hint").innerText = "Проверьте интернет/настройки.";
      console.error(e);
    }
  }

  async function bookService() {
    try {
      const name = document.getElementById("customerName").value.trim();
      const time = document.getElementById("bookingTime").value;

      if (!selectedService) {
        alert("Выберите услугу");
        return;
      }
      if (!name || !time) {
        alert("Заполните имя и время");
        return;
      }

      setStatus("Записываем...", "muted");

      const payload = {
        agent_id: agentId,
        service_id: selectedService.id,
        customer_name: name,
        start_time: time,
        customer_tg_id: customerTgId, // <- важное поле
      };

      const { error } = await supabase
        .from("bookings")
        .insert(payload);

      if (error) {
        console.error(error);
        setStatus("Ошибка записи. Проверьте RLS/поля таблицы.", "error");
        return;
      }

      setStatus("Вы записаны ✅", "ok");

    } catch (e) {
      console.error(e);
      setStatus("Ошибка записи (скрипт).", "error");
    }
  }

  loadData();
</script>

</body>
</html>
