<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Booking</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin:0; padding:16px; }
    h2 { margin: 0 0 8px 0; }
    .muted { color:#666; font-size:14px; }
    .card { border:1px solid #eee; border-radius:14px; padding:14px; margin:12px 0; }
    button { width:100%; padding:12px; border-radius:12px; border:0; font-size:16px; cursor:pointer; }
    .btn { background:#111; color:#fff; }
    .btn2 { background:#f2f2f2; color:#111; }
    input { width:100%; padding:12px; border:1px solid #ddd; border-radius:12px; font-size:16px; box-sizing:border-box; }
    .hidden { display:none; }
    .ok { color:#0a7; }
    .err { color:#b00020; }
    .serviceBtn { text-align:left; }
  </style>
</head>

<body>
  <h2 id="title">Загрузка…</h2>
  <div id="sub" class="muted"></div>

  <div id="servicesCard" class="card hidden">
    <div class="muted" style="margin-bottom:10px">Выберите услугу:</div>
    <div id="servicesList"></div>
    <div id="noServices" class="muted hidden">У агента пока нет услуг.</div>
  </div>

  <div id="formCard" class="card hidden">
    <div id="picked" style="font-weight:700; margin-bottom:10px"></div>
    <input id="customerName" placeholder="Ваше имя" />
    <div style="height:10px"></div>
    <input id="bookingTime" type="datetime-local" />
    <div style="height:12px"></div>
    <button id="bookBtn" class="btn">Записаться</button>
    <div id="status" class="muted" style="margin-top:10px"></div>
    <div style="height:10px"></div>
    <button id="backBtn" class="btn2">Выбрать другую услугу</button>
  </div>

<script>
(function () {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  // На экран выводим любые ошибки (чтобы не было "просто загрузка")
  const fatal = (msg) => {
    document.getElementById("title").textContent = "Ошибка";
    document.getElementById("sub").textContent = msg;
  };
  window.addEventListener("error", (e) => fatal(e?.message || "JS error"));
  window.addEventListener("unhandledrejection", (e) => fatal(e?.reason?.message || "Promise error"));

  const show = (id) => document.getElementById(id).classList.remove("hidden");
  const hide = (id) => document.getElementById(id).classList.add("hidden");
  const setStatus = (text, cls="muted") => {
    const el = document.getElementById("status");
    el.className = cls;
    el.textContent = text || "";
  };

  // ====== CONFIG ======
  const SUPABASE_URL = "https://uuiprnacqstiwfuxvyet.supabase.co";
  const SUPABASE_KEY = "sb_publishable_B5Zyxa2UnTqlFaOvf1G_kg_2DS9kiqs";

  // клиент Supabase — НЕ называем "supabase" (чтобы не ловить конфликт)
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // agentCode приходит только из deep link: https://t.me/<bot>?startapp=CODE
  const agentCode = tg?.initDataUnsafe?.start_param || null;

  // данные клиента (для уведомлений через n8n)
  const customerTgId = tg?.initDataUnsafe?.user?.id || null;
  const customerUsername = tg?.initDataUnsafe?.user?.username || null;
  const customerFullName = [tg?.initDataUnsafe?.user?.first_name, tg?.initDataUnsafe?.user?.last_name].filter(Boolean).join(" ") || null;

  let agentId = null;
  let selectedService = null;

  async function init() {
    document.getElementById("title").textContent = "Загрузка…";
    document.getElementById("sub").textContent = "";

    if (!agentCode) {
      document.getElementById("title").textContent = "Ссылка агента не указана";
      document.getElementById("sub").textContent = "Откройте ссылку вида: t.me/<bot>?startapp=CODE";
      return;
    }

    // 1) Агент
    const { data: agent, error: e1 } = await sb
      .from("agents")
      .select("id, full_name, username, agent_code")
      .eq("agent_code", agentCode)
      .maybeSingle();

    if (e1) return fatal("Supabase agents error: " + e1.message);
    if (!agent) {
      document.getElementById("title").textContent = "Агент не найден";
      document.getElementById("sub").textContent = "Проверьте правильность ссылки агента.";
      return;
    }

    agentId = agent.id;
    document.getElementById("title").textContent = "Запись к " + (agent.full_name || agent.username || "агенту");
    document.getElementById("sub").textContent = "Выберите услугу и время.";

    // 2) Услуги
    const { data: services, error: e2 } = await sb
      .from("services")
      .select("id, title, duration_min, price")
      .eq("agent_id", agentId)
      .order("created_at", { ascending: false });

    if (e2) return fatal("Supabase services error: " + e2.message);

    show("servicesCard");
    const list = document.getElementById("servicesList");
    list.innerHTML = "";
    hide("noServices");

    if (!services || services.length === 0) {
      show("noServices");
      return;
    }

    services.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "btn2 serviceBtn";
      btn.style.margin = "8px 0";
      btn.innerHTML = `<b>${escapeHtml(s.title)}</b><div class="muted">${s.duration_min || 0} мин ${s.price ? "• " + s.price : ""}</div>`;
      btn.addEventListener("click", () => {
        selectedService = s;
        document.getElementById("picked").textContent = "Вы выбрали: " + s.title;
        show("formCard");
        setStatus("");
      });
      list.appendChild(btn);
    });
  }

  async function book() {
    if (!selectedService) return alert("Выберите услугу");
    const name = document.getElementById("customerName").value.trim();
    const time = document.getElementById("bookingTime").value;

    if (!name || !time) return alert("Заполните имя и время");

    setStatus("Записываем…");

    const { error } = await sb.from("bookings").insert({
      agent_id: agentId,
      service_id: selectedService.id,
      customer_name: name,
      start_time: time,
      customer_tg_id: customerTgId,
      customer_username: customerUsername,
      customer_full_name: customerFullName,
      notified: false
    });

    if (error) {
      console.error(error);
      setStatus("Ошибка записи: " + error.message, "err");
      return;
    }

    setStatus("Вы записаны ✅", "ok");
    tg?.HapticFeedback?.notificationOccurred?.("success");
  }

  function reset() {
    selectedService = null;
    hide("formCard");
    setStatus("");
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  document.getElementById("bookBtn").addEventListener("click", book);
  document.getElementById("backBtn").addEventListener("click", reset);

  init();
})();
</script>
</body>
</html>
